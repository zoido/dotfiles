matches:
  - triggers: [";;date", ";;today",]
    replace: "{{ today }}"
    vars:
      - name: today
        type: date
        params:
          format: "%F"

  - triggers: [";;tomorrow", ";;tmrw"]
    replace: "{{ tomorrow }}"
    vars:
      - name: tomorrow
        type: date
        params:
          format: "%F"
          offset: 86400

  - triggers: [";;yesterday", ";;yday"]
    replace: "{{ yesterday }}"
    vars:
      - name: yesterday
        type: date
        params:
          format: "%F"
          offset: -86400

  - trigger: ";;now"
    replace: "{{ now }}"
    vars:
      - name: now
        type: date
        params:
          format: "%R"

  - trigger: ";;snow"
    replace: "{{ now }}"
    vars:
      - name: now
        type: date
        params:
          format: "%T"

  - trigger: ";;ts"
    replace: "{{ ts }}"
    vars:
      - name: ts
        type: date
        params:
          format: "%+"

  - trigger: ";;uts"
    replace: "{{ uts }}"
    vars:
      - name: uts
        type: date
        params:
          format: "%s"

  - trigger: ";;week"
    replace: "{{ week }}"
    vars:
      - name: week
        type: date
        params:
          format: "%Y-W%V"

  - trigger: ";;nweek"
    replace: "{{ week }}"
    vars:
      - name: week
        type: date
        params:
          format: "%Y-W%V"
          offset: 604800

  - trigger: ";;pweek"
    replace: "{{ week }}"
    vars:
      - name: week
        type: date
        params:
          format: "%Y-W%V"
          offset: -604800

  - trigger: ";;year"
    replace: "{{ year }}"
    vars:
      - name: year
        type: date
        params:
          format: "%Y"

  - trigger: ";;nyear"
    replace: "{{ year }}"
    vars:
      - name: year
        type: date
        params:
          format: "%Y"
          offset: 31536000

  - trigger: ";;pyear"
    replace: "{{ year }}"
    vars:
      - name: year
        type: date
        params:
          format: "%Y"
          offset: -31536000

  # Monday
  - triggers: [";;monday", ";;tmonday", ";;thismonday"]
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "python3 -c \"import datetime; d=datetime.date.today(); print(d + datetime.timedelta(days=(0-d.weekday()) % 7))\""

  - triggers: [";;nmonday", ";;nextmonday"]
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "python3 -c \"import datetime; d=datetime.date.today(); print(d + datetime.timedelta(days=(0-d.weekday()) % 7 or 7))\""

  - triggers: [";;pmonday", ";;prevmonday", ";;previousmonday"]
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "python3 -c \"import datetime; d=datetime.date.today(); print(d - datetime.timedelta(days=(d.weekday()-0) % 7 or 7))\""

  # Tuesday
  - triggers: [";;tuesday", ";;ttuesday", ";;thistuesday"]
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "python3 -c \"import datetime; d=datetime.date.today(); print(d + datetime.timedelta(days=(1-d.weekday()) % 7))\""

