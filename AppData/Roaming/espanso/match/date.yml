      - name: output
        type: shell
        params:
          cmd: "python3 -c \"import datetime; d=datetime.date.today(); print(d + datetime.timedelta(days=(1-d.weekday()) % 7 or 7))\""

  - triggers: [";;ptuesday", ";;prevtuesday", ";;previoustuesday"]
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "python3 -c \"import datetime; d=datetime.date.today(); print(d - datetime.timedelta(days=(d.weekday()-1) % 7 or 7))\""

  # Wednesday
