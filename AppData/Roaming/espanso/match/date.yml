      - name: output
        type: shell
        params:
          cmd: "python -c \"import datetime; d=datetime.date.today(); print(d + datetime.timedelta(days=(2-d.weekday()) % 7 or 7))\""

  - trigger: ";;pwed"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "python -c \"import datetime; d=datetime.date.today(); print(d - datetime.timedelta(days=(d.weekday()-2) % 7 or 7))\""

  # Thursday
