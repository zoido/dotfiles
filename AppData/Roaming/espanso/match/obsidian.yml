matches:
  - trigger: "[[today"
    replace: "[[{{today}}]]"
    vars:
      - name: today
        type: match
        params:
          trigger: ;;today

  - trigger: "[[yday"
    replace: "[[{{yday}}]]"
    vars:
      - name: yday
        type: match
        params:
          trigger: ;;yday

  - trigger: "[[tmrw"
    replace: "[[{{tmrw}}]]"
    vars:
      - name: tmrw
        type: match
        params:
          trigger: ;;tmrw

  - trigger: "[[week"
    replace: "[[{{week}}]]"
    vars:
      - name: week
        type: match
        params:
          trigger: ;;week

  - trigger: "[[pweek"
    replace: "[[{{pweek}}]]"
    vars:
      - name: pweek
        type: match
        params:
          trigger: ;;pweek

  - trigger: "[[nweek"
    replace: "[[{{nweek}}]]"
    vars:
      - name: nweek
        type: match
        params:
          trigger: ;;nweek

  - trigger: "[[year"
    replace: "[[{{year}}]]"
    vars:
      - name: year
        type: match
        params:
          trigger: ;;year

  - trigger: "[[pyear"
    replace: "[[{{pyear}}]]"
    vars:
      - name: pyear
        type: match
        params:
          trigger: ;;pyear

  - trigger: "[[nyear"
    replace: "[[{{nyear}}]]"
    vars:
      - name: nyear
        type: match
        params:
          trigger: ;;nyear

  # Monday
  - triggers: ["[[monday", "[[tmonday", "[[thismonday"]
    replace: "[[{{val}}]]"
    vars:
      - name: val
        type: match
        params:
          trigger: ;;monday

  - triggers: ["[[nmonday", "[[nextmonday"]
    replace: "[[{{val}}]]"
    vars:
      - name: val
        type: match
        params:
          trigger: ;;nmonday

  - triggers: ["[[pmonday", "[[prevmonday", "[[previousmonday"]
