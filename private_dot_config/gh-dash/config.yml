pager:
  diff: diffnav

prSections:
  - title: My
    filters: is:open author:@me
  - title: Review Requested
    filters: is:open review-requested:@me

repoPaths:
  h2oai/*: ~/dev/h2o.ai/*
  zoido/*: ~/dev/zoido/*

keybindings:
  prs:
    - key: T
      name: Actions
      command: gh enhance -R {{.RepoName}} {{.PrNumber}}
    - key: M
      name: Auto Merge
      command: gh pr merge {{.PrNumber}} --repo {{.RepoName}} --auto --squash
    - key: B
      name: Create Review Branch
      command: >
        zellij run -- wt -C {{.RepoPath}} switch lp/review/{{.HeadRefName}} --create --base {{.HeadRefName}}
    - key: z
      name: New pane with pr
      command: >
        zellij run -- wt -C {{.RepoPath}} switch pr:{{.PrNumber}} -x fish
    - key: Z
      name: New pane with review branch
      command: >
        zellij run -- wt -C {{.RepoPath}} switch lp/review/{{.HeadRefName}} -x fish
