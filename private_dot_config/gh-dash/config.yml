defaults:
  prApproveComment: ""
pager:
  diff: diffnav

prSections:
  - title: Review
    filters: is:open review-requested:@me
             -author:app/dependabot -author:app/github-actions
  - title: Review (bots)
    filters: is:open review-requested:@me
             author:app/dependabot author:app/github-actions
  - title: My
    filters: is:open author:@me
  - title: All Open
    filters: is:open

repoPaths:
  h2oai/*: ~/dev/h2o.ai/*
  zoido/*: ~/dev/zoido/*

keybindings:
  prs:
    - key: T
      name: Actions
      command: gh enhance -R {{.RepoName}} {{.PrNumber}}
    - key: M
      name: Auto Merge
      command: >
        zellij run -c --floating --cwd {{.RepoPath}} --
        fish -c "
        gum confirm --default=no 'Auto merge PR {{.PrNumber}}?'
        && gh pr merge {{.PrNumber}} --repo {{.RepoName}} --auto --squash
        "
    - key: V
      name: Approve & Auto Merge
      command: >
        zellij run -c --floating --cwd {{.RepoPath}} --
        fish -c "
        gum confirm --default=no 'Approve & auto merge PR {{.PrNumber}}?'
        && gh pr merge {{.PrNumber}} --repo {{.RepoName}} --auto --squash
        && gh pr review {{.PrNumber}} --repo {{.RepoName}} --approve
        "
    - key: z
      name: PR Branch Shell
      command: >
        zellij run -c --cwd {{.RepoPath}} -- fish -c "wt switch pr:{{.PrNumber}} -x fish" > /dev/null
    - key: Z
      name: Review Branch Shell
      command: >
        set output (git -C {{.RepoPath}} fetch --all 2>&1); or echo $output;
        set output (wt switch -C {{.RepoPath}} --create lp/review/{{.HeadRefName}} --base {{.HeadRefName}} 2>&1); or echo $output;
        zellij run -c --cwd {{.RepoPath}} -- fish -c "wt switch lp/review/{{.HeadRefName}} -x fish" > /dev/null

theme:
  colors:
    text:
      primary: "#cad3f5"
      secondary: "#b7bdf8"
      inverted: "#181926"
      faint: "#b8c0e0"
      warning: "#eed49f"
      success: "#a6da95"
      error: "#ed8796"
    background:
      selected: "#363a4f"
    border:
      primary: "#b7bdf8"
      secondary: "#494d64"
      faint: "#363a4f"
