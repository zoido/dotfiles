theme = "monokai_pro_octagon"

[editor]
color-modes = true
cursorline = true
rulers = [80, 100, 120]
trim-trailing-whitespace = true
true-color = true

[editor.auto-save]
after-delay.enable = true
focus-lost = true

[keys.normal]
"[" = {"[" = "select_prev_sibling"}
"]" = {"]" = "select_next_sibling"}

[keys.normal.space]
b = ":echo %sh{git blame -L %{cursor_line},+1 %{buffer_name}}"
B = ":sh zellij run -c -- git blame %{buffer_name}"
